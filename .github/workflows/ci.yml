name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: TypeCheck
        run: npm run typecheck
  
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit:coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: ${{ always() && env.CODECOV_TOKEN != '' }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
  
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Setup database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          npm run db:push
          npm run db:seed
      
      - name: Build application
        run: npm run build
      
      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SESSION_SECRET: test-secret-key
          ENCRYPTION_KEY: test-encryption-key-32-chars!!
          BASE_URL: http://localhost:3000
        run: npm run test:e2e
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
  
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Changelog guard (main push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Checking for version update in app/config/version.ts"
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -c "^app/config/version.ts$")
          if [ "$CHANGED" -eq 0 ]; then
            echo "ERROR: version.ts not updated. Update app/config/version.ts for every deploy."
            exit 1
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Check build output
        run: |
          ls -la build/
          ls -la build/client/
          ls -la build/server/
  
  deploy-saas:
    name: Deploy SaaS to Production
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Validate Coolify deploy secrets
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
        run: |
          for secret_name in COOLIFY_API_TOKEN COOLIFY_APP_UUID COOLIFY_BASE_URL; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: $secret_name"
              exit 1
            fi
          done

      - name: Trigger Coolify deployment
        id: coolify_deploy
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
        run: |
          RESPONSE=$(curl -fsS -X POST \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            "${COOLIFY_BASE_URL}/api/v1/applications/${COOLIFY_APP_UUID}/start?force=true")
          echo "$RESPONSE"
          DEPLOYMENT_UUID=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1]).get("deployment_uuid",""))' "$RESPONSE")
          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "Coolify API did not return deployment_uuid"
            exit 1
          fi
          echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"

      - name: Wait for Coolify deployment
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          DEPLOYMENT_UUID: ${{ steps.coolify_deploy.outputs.deployment_uuid }}
        run: |
          echo "Monitoring deployment $DEPLOYMENT_UUID"
          for attempt in $(seq 1 30); do
            RESPONSE=$(curl -fsS \
              -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
              "${COOLIFY_BASE_URL}/api/v1/deployments/${DEPLOYMENT_UUID}")
            STATUS=$(python3 -c 'import json,sys; print(str(json.loads(sys.argv[1]).get("status","unknown")).lower())' "$RESPONSE")
            echo "Attempt $attempt/30: status=$STATUS"
            case "$STATUS" in
              finished|success|successful|completed)
                exit 0
                ;;
              failed|failure|error|canceled|cancelled)
                echo "$RESPONSE"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for Coolify deployment to finish"
          exit 1

  deploy-openclaw:
    name: Deploy OpenClaw to Production
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect OpenClaw changes
        id: openclaw_changes
        run: |
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q "^openclaw-gateway/"; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Coolify deploy secrets
        if: steps.openclaw_changes.outputs.should_deploy == 'true'
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_OPENCLAW_APP_UUID: ${{ secrets.COOLIFY_OPENCLAW_APP_UUID }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
        run: |
          for secret_name in COOLIFY_API_TOKEN COOLIFY_OPENCLAW_APP_UUID COOLIFY_BASE_URL; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing required secret: $secret_name"
              exit 1
            fi
          done

      - name: Trigger OpenClaw deployment
        if: steps.openclaw_changes.outputs.should_deploy == 'true'
        id: coolify_openclaw_deploy
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_OPENCLAW_APP_UUID: ${{ secrets.COOLIFY_OPENCLAW_APP_UUID }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
        run: |
          RESPONSE=$(curl -fsS -X POST \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            "${COOLIFY_BASE_URL}/api/v1/applications/${COOLIFY_OPENCLAW_APP_UUID}/start?force=true")
          echo "$RESPONSE"
          DEPLOYMENT_UUID=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1]).get("deployment_uuid",""))' "$RESPONSE")
          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "Coolify API did not return deployment_uuid"
            exit 1
          fi
          echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"

      - name: Wait for OpenClaw deployment
        if: steps.openclaw_changes.outputs.should_deploy == 'true'
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          DEPLOYMENT_UUID: ${{ steps.coolify_openclaw_deploy.outputs.deployment_uuid }}
        run: |
          echo "Monitoring deployment $DEPLOYMENT_UUID"
          for attempt in $(seq 1 30); do
            RESPONSE=$(curl -fsS \
              -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
              "${COOLIFY_BASE_URL}/api/v1/deployments/${DEPLOYMENT_UUID}")
            STATUS=$(python3 -c 'import json,sys; print(str(json.loads(sys.argv[1]).get("status","unknown")).lower())' "$RESPONSE")
            echo "Attempt $attempt/30: status=$STATUS"
            case "$STATUS" in
              finished|success|successful|completed)
                exit 0
                ;;
              failed|failure|error|canceled|cancelled)
                echo "$RESPONSE"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for Coolify deployment to finish"
          exit 1

      - name: Skip OpenClaw deployment
        if: steps.openclaw_changes.outputs.should_deploy != 'true'
        run: echo "No changes under openclaw-gateway/. Skipping OpenClaw deploy."
